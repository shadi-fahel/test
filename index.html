<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بنك أسئلة قواعد السير</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --success: #c8e6c9;
            --success-border: #4caf50;
            --error: #ffcdd2;
            --error-border: #f44336;
            --bg: #eceff1;
            --white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 0;
            direction: rtl;
        }

        .header-sticky {
            position: sticky;
            top: 0;
            background: var(--white);
            box-shadow: 0 2px 15px rgba(0,0,0,0.1);
            padding: 10px 0;
            z-index: 1000;
            border-bottom: 4px solid var(--accent);
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
            padding: 0 15px;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        h1 { margin: 0; font-size: 1.1rem; color: var(--primary); }

        .reset-btn {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            padding: 6px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: bold;
            transition: 0.2s;
        }

        .reset-btn:hover { background: #f1b0b7; }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 10px;
        }

        .stat-item {
            background: #f8f9fa;
            padding: 8px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid #eee;
        }

        .stat-label { font-size: 0.65rem; color: #666; display: block; }
        .stat-value { font-size: 0.9rem; font-weight: bold; }

        .filter-tabs {
            display: flex;
            gap: 5px;
            margin-top: 5px;
        }

        .tab {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #e9ecef;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.8rem;
            transition: 0.2s;
        }

        .tab.active { background: var(--accent); color: white; }
        .tab-correct.active { background: #4caf50; }
        .tab-wrong.active { background: #f44336; }

        .q-card {
            background: var(--white);
            padding: 20px;
            border-radius: 12px;
            margin-top: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .q-img {
            width: 100%;
            max-height: 300px;
            object-fit: contain;
            border-radius: 8px;
            margin-bottom: 15px;
            background: #fdfdfd;
            border: 1px solid #eee;
        }

        .filtered-hidden { display: none !important; }

        .q-text { font-size: 1rem; font-weight: bold; margin-bottom: 15px; display: block; line-height: 1.5; }

        .options-list { list-style: none; padding: 0; display: flex; flex-direction: column; gap: 8px; }

        .opt {
            padding: 12px 15px;
            border: 1px solid #eee;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
            background: #f9f9f9;
            font-size: 0.9rem;
        }

        .opt.is-correct { 
            background-color: var(--success) !important; 
            border-color: var(--success-border) !important; 
            font-weight: bold; 
        }

        .opt.is-wrong { 
            background-color: var(--error) !important; 
            border-color: var(--error-border) !important; 
        }

        .disabled { pointer-events: none; }
        
        #confirm-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            justify-content: center; align-items: center;
        }

        .modal-content { background: white; padding: 25px; border-radius: 12px; width: 85%; max-width: 320px; text-align: center; }
        .modal-btns { display: flex; gap: 10px; margin-top: 20px; }
        .m-btn { flex: 1; padding: 10px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .m-btn.yes { background: #f44336; color: white; }
        .m-btn.no { background: #eee; }
    </style>
</head>
<body>

<div id="confirm-modal">
    <div class="modal-content">
        <p>هل تريد تصفير كافة الإجابات والبدء من جديد؟</p>
        <div class="modal-btns">
            <button class="m-btn yes" onclick="confirmReset()">نعم</button>
            <button class="m-btn no" onclick="closeModal()">إلغاء</button>
        </div>
    </div>
</div>

<div class="header-sticky">
    <div class="container">
        <div class="header-top">
            <h1>🚦 بنك أسئلة قواعد السير</h1>
            <button class="reset-btn" onclick="openModal()">تصفير 🔄</button>
        </div>
        
        <div class="stats-grid">
            <div class="stat-item"><span class="stat-label">المجابة</span><span class="stat-value" id="stat-answered">0/160</span></div>
            <div class="stat-item"><span class="stat-label">صح</span><span class="stat-value" style="color:#4caf50" id="stat-correct">0</span></div>
            <div class="stat-item"><span class="stat-label">خطأ</span><span class="stat-value" style="color:#f44336" id="stat-wrong">0</span></div>
            <div class="stat-item"><span class="stat-label">النسبة</span><span class="stat-value" id="stat-percent">0%</span></div>
        </div>

        <div class="filter-tabs">
            <button class="tab active" id="tab-all" data-mode="all">الكل</button>
            <button class="tab tab-correct" data-mode="correct">صحيحة</button>
            <button class="tab tab-wrong" data-mode="wrong">خاطئة</button>
        </div>
    </div>
</div>

<div class="container" id="quiz-container"></div>
<div id="empty-msg" style="display:none; text-align:center; padding:50px; color:#888;" class="container">لا توجد أسئلة لعرضها هنا.</div>

<script>
    // تم إضافة حقل img لكل سؤال. إذا كان السؤال يحتوي صورة، ضع اسم الملف (مثلاً: q1.jpg). إذا لم يوجد، اتركه فارغاً "".
    const questions = [
        { q: "عند دخولك في نفق أثناء القيادة نهاراً عليك:", options: ["الاستمرار بالسير بطريقة طبيعية", "استعمال الزمور", "إضاءة المصابيح وتخفيف السرعة", "إضاءة المصابيح وزيادة السرعة"], answer: 2 }, { q: "يمنع استعمال الزمور:", options: ["منعاً باتاً", "خارج المدينة فقط", "بوجود إشارة ممنوع التزمير", "داخل المدينة فقط"], answer: 2 }, { q: "إن المركبات غير المسرعة والتي تسير على طريق من ثلاثة مسارب عليها السير في:", options: ["أي مسرب كان", "المسرب الأيمن", "المسرب الأيسر", "المسرب الأوسط"], answer: 1 }, { q: "البقعة العمياء بالنسبة لسائق المركبة هي:", options: ["منطقة ضمن نطاق مرايا المركبة", "منطقة كثيفة الضباب", "منطقة غير مضاءة ليلاً", "منطقة خارج نطاق مرايا المركبة"], answer: 3 }, { q: "إذا أراد السائق أن ينعطف بمركبته إلى جهة اليمين عليه قبل الانعطاف أن ينظر في:", options: ["المرآة اليمنى فقط", "المرآة الداخلية فقط", "كل المرايا وخاصة في المرآة اليمنى", "المرآة اليسرى فقط"], answer: 2 }, { q: "في حال انزلقت مركبتك عليك كسائق أن تكون ردة فعلك الأولى:", options: ["تزيد السرعة وتوجه المركبة بعكس اتجاه انزلاق مؤخرتها", "لا تضغط على الفرامل وتوجه المركبة إلى الجهة التي تنزلق بها مؤخرتها", "تضغط على الفرامل وتوجه المركبة بعكس اتجاه انزلاق مؤخرتها", "تشد فرامل اليد وتوجه المركبة إلى الجهة التي تنزلق بها مؤخرتها"], answer: 1 }, { q: "عندما يريد السائق أن يستمر بشكل مستقيم عبر التقاطع عليه أن:", options: ["يتخذ المسرب الأيسر مسبقاً", "يتخذ المسرب الفارغ مسبقاً", "يختار المسرب الأوسط مسبقاً", "يتخذ المسرب الأيمن مسبقاً"], answer: 2 }, { q: "عندما يريد السائق أن يستمر بالتقدم بشكل مستقيم عبر التقاطع عليه أن:", options: ["يشغل إشارات التحذير", "يعطي إشارة إلى اليسار", "لا يعطي أية إشارة", "يعطي إشارة إلى اليمين"], answer: 2 }, { q: "عندما يقترب السائق من التقاطع وتكون الاشارة الضوئية خضراء منذ فترة يجب عليه أن:", options: ["يسابق الضوء الأخضر قبل أن يتحول إلى الأحمر", "لا يسابق الضوء الأخضر ويعبر بسرعة عادية", "يستعمل الزمور بشكل متواصل لتنبيه الآخرين", "ينير الضوء العالي لتأكيد حقه بالمرور"], answer: 1 }, { q: "عند تقاطع الطرق يجب على سائق المركبة:", options: ["تخفيف السرعة", "استعمال الزمور", "استعمال أضواء التحذير", "إنارة الضوء العالي"], answer: 0 }, { q: "يسمح بإيقاف المركبة على طريق ذو مسلكين متعاكسين:", options: ["على الرصيف", "على يمين اتجاه سير المركبة بشكل موازي للرصيف", "في أي جهة طالما أنها لا تعيق حركة السير", "على يمين اتجاه سير المركبة بشكل عرضي"], answer: 1 }, { q: "في حال ظهور مركبة من الجهة المعاكسة أثناء استعمالك للإضاءة العالية ليلاً عليك:", options: ["تخفيض السرعة فوراً", "إطفاء الأنوار بشكل كامل", "تخفيض الضوء فوراً", "تقطيع الضوء بتبديله بين العالي والمنخفض"], answer: 2 }, { q: "عند تقاطع معين إذا تحولت الاشارة من اللون الأخضر إلى اللون الأصفر لحظة عبور مركبتك للتقاطع عليك:", options: ["التوقف والرجوع إلى الوراء", "التوقف وانتظار أوامر شرطي المرور", "التوقف فوراً وسط التقاطع", "متابعة سيرك بانتباه"], answer: 3 }, { q: "عندما يسمع السائق صفارة إنذار مركبة الطوارئ أثناء القيادة عليه أن:", options: ["يزيد سرعته كي لا يعرقل السير", "يسير أمامها ويستعمل الزمور ليفتح لها الطريق", "يسير خلفها مباشرة كسباً للوقت", "يتنحى جانباً أو يتوقف"], answer: 3 }, { q: "يمكن للمركبات التجاوز:", options: ["على الجسور", "على المنعطفات", "على الطرق المستقيمة", "داخل الأنفاق"], answer: 2 }, { q: "يجب على سائق المركبة أثناء القيادة أن ينظر في المرايا:", options: ["بشكل مطول من وقت لآخر", "بشكل لمحات سريعة من وقت لآخر", "فقط إذا أراد الانعطاف", "فقط إذا أراد تجاوز مركبة أخرى"], answer: 1 }, { q: "إن وضع حزام الأمان:", options: ["ضروري للسائق فقط", "ضروري لجميع ركاب السيارة", "ضروري للركاب في المقعد الأمامي فقط", "غير ضروري داخل المدينة"], answer: 1 }, { q: "عندما يريد السائق أن ينعطف بمركبته إلى اليسار عند التقاطع عليه أن:", options: ["يتخذ المسرب الأيمن مسبقاً", "يستعمل الزمور لتنبيه الآخرين", "يتخذ المسرب الأوسط مسبقاً", "يتخذ المسرب الأيسر مسبقاً"], answer: 3 }, { q: "عند شعورك بالنعاس الشديد أثناء القيادة عليك:", options: ["زيادة السرعة قليلاً لكي يزول النعاس", "التوقف فوراً في مكان آمن لأخذ قسط من الراحة", "تشغيل المذياع على صوت مرتفع", "تناول الأدوية المنشطة ومتابعة المسير"], answer: 1 }, { q: "متى يجوز لك اجتياز خط المنع المتواص زمور بشكل مستمر ثم تتخطى السيارة المركونة"], answer: 2, img: "msk.jpg" }, { q: "في الحالة الموضحة بالصورة (تجاوز سيارة نقل لراكب دراجة وقربها منك):", options: [ "تستعمل الزمور بشكل مستمر لتنبيه سائق سيارة النقل", "تنير الضوء العالي مع إشارات التحذير", "تفرمل وتتجه ناحية اليمين لتفسح الطريق أمام سيارة النقل حتى تتمكن من تخطي راكب الدراجة", "تتابع سيرك بنفس الاستقامة لإجبار سيارة النقل على تخفيف سرعتها وقطع عملية التجاوز" ], answer: 2, img: "bus.jpg" }

        // يمكنك إكمال باقي الأسئلة بنفس النمط بإضافة img: "" في نهايتها.
    ];

    let userState = {}; 
    let scrollPositions = { all: 0, correct: 0, wrong: 0 };
    let currentMode = 'all';

    function renderQuiz() {
        const container = document.getElementById('quiz-container');
        container.innerHTML = '';
        questions.forEach((item, idx) => {
            const card = document.createElement('div');
            card.className = 'q-card';
            card.id = `q-idx-${idx}`;
            
            // التحقق مما إذا كان هناك صورة لعرضها
            const imageHtml = item.img ? `<img src="images/${item.img}" class="q-img" alt="سؤال ${idx + 1}">` : '';

            card.innerHTML = `
                <span class="q-text">س${idx + 1}: ${item.q}</span>
                ${imageHtml}
                <ul class="options-list" id="list-${idx}">
                    ${item.options.map((opt, oIdx) => `<li class="opt" onclick="handleSelect(${idx}, ${oIdx})">${opt}</li>`).join('')}
                </ul>
            `;
            container.appendChild(card);
        });
        updateStats();
    }

    // (باقي وظائف الـ JavaScript تبقى كما هي دون تغيير)
    window.handleSelect = function(qIdx, sIdx) {
        const list = document.getElementById(`list-${qIdx}`);
        if (list.classList.contains('solved')) return;
        const correct = questions[qIdx].answer;
        userState[qIdx] = { selected: sIdx, isCorrect: (sIdx === correct) };
        list.classList.add('solved');
        list.querySelectorAll('.opt').forEach((opt, i) => {
            opt.classList.add('disabled');
            if (i === correct) opt.classList.add('is-correct');
            else if (i === sIdx && sIdx !== correct) opt.classList.add('is-wrong');
        });
        updateStats();
    };

    function updateStats() {
        const solved = Object.keys(userState);
        const right = solved.filter(k => userState[k].isCorrect).length;
        document.getElementById('stat-answered').innerText = solved.length + "/" + questions.length;
        document.getElementById('stat-correct').innerText = right;
        document.getElementById('stat-wrong').innerText = solved.length - right;
        document.getElementById('stat-percent').innerText = solved.length > 0 ? Math.round((right / solved.length) * 100) + '%' : '0%';
    }

    document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', function() {
            scrollPositions[currentMode] = window.scrollY;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            this.classList.add('active');
            currentMode = this.getAttribute('data-mode');
            applyFilter(currentMode);
            setTimeout(() => { window.scrollTo({ top: scrollPositions[currentMode], behavior: 'instant' }); }, 0);
        });
    });

    function applyFilter(mode) {
        let visibleCount = 0;
        questions.forEach((_, idx) => {
            const card = document.getElementById(`q-idx-${idx}`);
            const state = userState[idx];
            let show = (mode === 'all') || (mode === 'correct' && state?.isCorrect) || (mode === 'wrong' && state && !state.isCorrect);
            if (show) { card.classList.remove('filtered-hidden'); visibleCount++; }
            else { card.classList.add('filtered-hidden'); }
        });
        document.getElementById('empty-msg').style.display = (visibleCount === 0) ? 'block' : 'none';
    }

    window.openModal = () => document.getElementById('confirm-modal').style.display = 'flex';
    window.closeModal = () => document.getElementById('confirm-modal').style.display = 'none';
    window.confirmReset = () => { 
        userState = {}; scrollPositions = { all: 0, correct: 0, wrong: 0 };
        closeModal(); renderQuiz(); 
        document.querySelector('[data-mode="all"]').click();
    };

    window.onload = renderQuiz;
</script>
